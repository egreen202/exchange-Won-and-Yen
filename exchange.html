<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원 ⇅ 엔 환율 계산기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  h1 { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .rate-badge {
    font-size: 12px; color: #888; margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 5px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #3B6D11; flex-shrink: 0; }
  .field {
    background: #f9f9f7; border: 1px solid #e8e8e4;
    border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 10px;
  }
  .field label {
    font-size: 11px; color: #999; display: block;
    margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .field-row { display: flex; align-items: center; gap: 8px; }
  .field-row input {
    flex: 1; font-size: 28px; font-weight: 600;
    border: none; background: transparent; color: #111; outline: none; min-width: 0;
  }
  .field-row input::placeholder { color: #ccc; font-weight: 400; }
  .field-row .unit { font-size: 16px; font-weight: 600; color: #bbb; }
  .divider { text-align: center; color: #ccc; font-size: 20px; margin: 2px 0; }

  .section-title {
    font-size: 12px; font-weight: 600; color: #999;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin: 1.5rem 0 0.75rem;
  }
  .split-field {
    background: #f0f7ff; border: 1px solid #d0e6ff;
    border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 10px;
  }
  .split-field label {
    font-size: 11px; color: #7aabdd; display: block;
    margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .split-field .field-row input { color: #1a6abf; }
  .split-field .unit { color: #7aabdd; }

  .split-result {
    background: #f0f7ff; border: 1px solid #d0e6ff;
    border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 10px;
    display: none;
  }
  .split-result label {
    font-size: 11px; color: #7aabdd; display: block;
    margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .split-result .result-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px;
  }
  .split-result .result-row .r-label { font-size: 13px; color: #999; }
  .split-result .result-row .r-val { font-size: 22px; font-weight: 600; color: #1a6abf; }
  .split-result .result-row .r-unit { font-size: 14px; color: #7aabdd; margin-left: 4px; }

  .error { font-size: 13px; color: #e24b4a; margin-top: 12px; text-align: center; }
  .updated { font-size: 11px; color: #bbb; text-align: right; margin-top: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>엔 ⇅ 원</h1>
  <div class="rate-badge">
    <span class="dot"></span>
    <span id="rate-info">환율 불러오는 중...</span>
  </div>

  <div class="field">
    <label>일본 엔 JPY</label>
    <div class="field-row">
      <input type="number" id="jpy" placeholder="0" min="0" />
      <span class="unit">¥</span>
    </div>
  </div>

  <div class="divider">⇅</div>

  <div class="field">
    <label>한국 원 KRW</label>
    <div class="field-row">
      <input type="number" id="krw" placeholder="0" min="0" />
      <span class="unit">₩</span>
    </div>
  </div>

  <div class="section-title">엔빵</div>

  <div class="split-field">
    <label>인원수</label>
    <div class="field-row">
      <input type="number" id="people" placeholder="0" min="1" />
      <span class="unit">명</span>
    </div>
  </div>

  <div class="split-result" id="split-result">
    <label>1인당 금액</label>
    <div class="result-row">
      <span class="r-label">엔</span>
      <div>
        <span class="r-val" id="split-jpy">0</span>
        <span class="r-unit">¥</span>
      </div>
    </div>
    <div class="result-row">
      <span class="r-label">원</span>
      <div>
        <span class="r-val" id="split-krw">0</span>
        <span class="r-unit">₩</span>
      </div>
    </div>
  </div>

  <div id="error" class="error" style="display:none;"></div>
  <div id="updated" class="updated"></div>
</div>

<script>
let krwPerJpy = null;
let busy = false;

async function fetchRate() {
  const apis = [
    async () => {
      const r = await fetch('https://latest.currency-api.pages.dev/v1/currencies/jpy.json');
      const d = await r.json();
      return d.jpy.krw;
    },
    async () => {
      const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/jpy.json');
      const d = await r.json();
      return d.jpy.krw;
    },
    async () => {
      const r = await fetch('https://open.er-api.com/v6/latest/JPY');
      const d = await r.json();
      return d.rates.KRW;
    }
  ];

  for (const api of apis) {
    try {
      const rate = await api();
      if (rate && rate > 0) {
        krwPerJpy = rate;
        const jpyPerKrw = (1 / krwPerJpy).toFixed(4);
        document.getElementById('rate-info').textContent =
          `1엔 = ${krwPerJpy.toFixed(2)}원 · 1원 = ${jpyPerKrw}엔`;
        const now = new Date();
        document.getElementById('updated').textContent =
          `기준: ${now.toLocaleDateString('ko-KR')} ${now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})}`;
        return;
      }
    } catch(e) {}
  }

  document.getElementById('rate-info').textContent = '환율 로드 실패';
  const err = document.getElementById('error');
  err.textContent = '환율을 불러오지 못했습니다. 잠시 후 새로고침해주세요.';
  err.style.display = 'block';
}

function updateSplit() {
  const jpyVal = parseFloat(document.getElementById('jpy').value);
  const people = parseInt(document.getElementById('people').value);
  const result = document.getElementById('split-result');

  if (!krwPerJpy || isNaN(jpyVal) || isNaN(people) || people < 1 || jpyVal <= 0) {
    result.style.display = 'none';
    return;
  }

  const perJpy = jpyVal / people;
  const perKrw = perJpy * krwPerJpy;

  document.getElementById('split-jpy').textContent = Math.ceil(perJpy).toLocaleString('ko-KR');
  document.getElementById('split-krw').textContent = Math.ceil(perKrw).toLocaleString('ko-KR');
  result.style.display = 'block';
}

document.getElementById('jpy').addEventListener('input', function() {
  if (!krwPerJpy || busy) return;
  busy = true;
  const v = parseFloat(this.value);
  document.getElementById('krw').value = isNaN(v) ? '' : Math.round(v * krwPerJpy);
  busy = false;
  updateSplit();
});

document.getElementById('krw').addEventListener('input', function() {
  if (!krwPerJpy || busy) return;
  busy = true;
  const v = parseFloat(this.value);
  document.getElementById('jpy').value = isNaN(v) ? '' : (v / krwPerJpy).toFixed(2);
  busy = false;
  updateSplit();
});

document.getElementById('people').addEventListener('input', updateSplit);

fetchRate();
</script>
</body>
</html>
